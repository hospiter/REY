<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ارتباط با ریحانه وهاب‌زاده</title>

    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --primary: #3d5296;
            --primary-dark: #1a2744;
            --secondary: #cdd5ee;
            --light: #f4f6fb;
            --gray: #64748b;
            --radius: 18px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        body {
            direction: rtl;
            font-family: 'Vazirmatn', sans-serif;
            background: #f4f6fb;
            color: var(--primary-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* HEADER */
        header {
            background: linear-gradient(135deg, #1a2744, #243566);
            color: white;
            box-shadow: 0 8px 30px rgba(0,0,0,.18);
        }

        .header-content {
            max-width: 1200px;
            margin: auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            min-height: 75px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: white;
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: rgba(255,255,255,.15);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .logo h1 { font-size: 18px; font-weight: 700; }
        .logo p  { font-size: 11px; opacity: .8; }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: rgba(255,255,255,.85);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: .3s;
            padding: 8px 16px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,.2);
        }

        .back-btn:hover {
            background: rgba(255,255,255,.1);
            color: white;
        }

        /* MAIN */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 50px 20px;
        }

        .contact-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(26,39,68,.12);
            padding: 50px 44px;
            width: 100%;
            max-width: 560px;
            border: 1px solid rgba(61,82,150,.08);
        }

        .card-header {
            text-align: center;
            margin-bottom: 36px;
        }

        .card-icon {
            width: 72px;
            height: 72px;
            border-radius: 20px;
            background: rgba(61,82,150,.08);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 18px;
            font-size: 28px;
            color: var(--primary);
        }

        .card-header h2 {
            font-size: 26px;
            font-weight: 800;
            color: var(--primary-dark);
            margin-bottom: 8px;
        }

        .card-header p {
            color: var(--gray);
            font-size: 15px;
            line-height: 1.8;
        }

        /* FORM */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--primary-dark);
            margin-bottom: 8px;
        }

        label span {
            color: #e74c3c;
            margin-right: 3px;
        }

        input[type="text"],
        input[type="email"],
        textarea {
            width: 100%;
            padding: 13px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            font-family: 'Vazirmatn', sans-serif;
            font-size: 15px;
            color: var(--primary-dark);
            background: #fafbfd;
            transition: .3s;
            outline: none;
            direction: rtl;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        textarea:focus {
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 3px rgba(61,82,150,.08);
        }

        textarea {
            resize: vertical;
            min-height: 140px;
            line-height: 1.8;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #243566, #1a2744);
            color: white;
            border: none;
            border-radius: 50px;
            font-family: 'Vazirmatn', sans-serif;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: .3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 8px 20px rgba(26,39,68,.25);
            margin-top: 8px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 28px rgba(26,39,68,.3);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        /* SUCCESS STATE */
        .success-state {
            display: none;
            text-align: center;
            padding: 20px 0;
        }

        .success-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(34,197,94,.1);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 34px;
            color: #16a34a;
        }

        .success-state h3 {
            font-size: 22px;
            font-weight: 800;
            color: var(--primary-dark);
            margin-bottom: 10px;
        }

        .success-state p {
            color: var(--gray);
            font-size: 15px;
            line-height: 1.8;
            margin-bottom: 28px;
        }

        .home-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #243566, #1a2744);
            color: white;
            text-decoration: none;
            padding: 13px 28px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 15px;
            transition: .3s;
            box-shadow: 0 8px 20px rgba(26,39,68,.2);
        }

        .home-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 28px rgba(26,39,68,.3);
        }

        /* DIVIDER */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 24px 0;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: #e2e8f0;
        }

        .divider-text {
            font-size: 12px;
            color: var(--gray);
            white-space: nowrap;
        }

        /* SOCIAL ROW */
        .social-row {
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .social-row a {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: var(--light);
            border: 1px solid rgba(61,82,150,.1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            text-decoration: none;
            font-size: 18px;
            transition: .3s;
        }

        .social-row a:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-3px);
        }

        /* RESPONSIVE */
        @media(max-width: 600px) {
            .contact-card {
                padding: 32px 22px;
            }
            .card-header h2 {
                font-size: 22px;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="header-content">
            <a href="index.html" class="logo">
                <div class="logo-icon">
                    <i class="fas fa-capsules"></i>
                </div>
                <div>
                    <h1>ریحانه وهاب‌زاده</h1>
                    <p>دانشجوی داروسازی</p>
                </div>
            </a>
            <a href="index.html" class="back-btn">
                <i class="fas fa-arrow-right"></i>
                بازگشت به خانه
            </a>
        </div>
    </header>

    <main>
        <div class="contact-card">

            <!-- FORM STATE -->
            <div id="formState">
                <div class="card-header">
                    <div class="card-icon">
                        <i class="fas fa-envelope-open-text"></i>
                    </div>
                    <h2>ارسال پیام</h2>
                    <p>برای همکاری علمی، پژوهشی یا تولید محتوای سلامت پیام بگذارید.</p>
                </div>

                <div class="form-group">
                    <label for="name">نام و نام خانوادگی <span>*</span></label>
                    <input type="text" id="name" placeholder="مثلاً: علی احمدی">
                </div>

                <div class="form-group">
                    <label for="email">ایمیل <span>*</span></label>
                    <input type="email" id="email" placeholder="example@email.com" style="direction:ltr;text-align:right;">
                </div>

                <div class="form-group">
                    <label for="subject">موضوع</label>
                    <input type="text" id="subject" placeholder="موضوع پیام شما">
                </div>

                <div class="form-group">
                    <label for="message">پیام <span>*</span></label>
                    <textarea id="message" placeholder="پیام خود را اینجا بنویسید..."></textarea>
                </div>

                <button class="submit-btn" onclick="sendMessage()">
                    <i class="fas fa-paper-plane"></i>
                    ارسال پیام
                </button>

                <div class="divider">
                    <div class="divider-line"></div>
                    <span class="divider-text">یا از شبکه‌های اجتماعی</span>
                    <div class="divider-line"></div>
                </div>

                <div class="social-row">
                    <a href="https://www.instagram.com/ryhne_vz?igsh=c2p3cjNobzk0d3d3" target="_blank" aria-label="اینستاگرام">
                        <i class="fab fa-instagram"></i>
                    </a>
                    <a href="https://t.me/Vzryhn" target="_blank" aria-label="تلگرام">
                        <i class="fab fa-telegram"></i>
                    </a>
                </div>
            </div>

            <!-- SUCCESS STATE -->
            <div class="success-state" id="successState">
                <div class="success-icon">
                    <i class="fas fa-check"></i>
                </div>
                <h3>پیام شما ارسال شد!</h3>
                <p>ممنون از پیام شما. در اولین فرصت پاسخ خواهم داد.</p>
                <a href="index.html" class="home-btn">
                    <i class="fas fa-home"></i>
                    بازگشت به صفحه اصلی
                </a>
            </div>

        </div>
    </main>

    <script>
        function sendMessage() {
            const name    = document.getElementById('name').value.trim();
            const email   = document.getElementById('email').value.trim();
            const message = document.getElementById('message').value.trim();

            if (!name) {
                alert('لطفاً نام خود را وارد کنید.');
                document.getElementById('name').focus();
                return;
            }
            if (!email) {
                alert('لطفاً ایمیل خود را وارد کنید.');
                document.getElementById('email').focus();
                return;
            }
            if (!message) {
                alert('لطفاً پیام خود را بنویسید.');
                document.getElementById('message').focus();
                return;
            }

            // نمایش حالت موفقیت
            document.getElementById('formState').style.display = 'none';
            document.getElementById('successState').style.display = 'block';

            // بازگشت خودکار به صفحه اصلی بعد از ۴ ثانیه
            setTimeout(function() {
                window.location.href = 'index.html';
            }, 4000);
        }
    </script>

</body>
</html>
